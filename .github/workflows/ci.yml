name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: install shells (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq zsh dash shellcheck
      - name: shellcheck
        if: runner.os == 'Linux'
        run: shellcheck -s sh install.sh tests/*.sh
      - name: run tests
        run: sh tests/run.sh
